services:
  - type: web
    name: wildfire-api
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      sh -c "gunicorn app:app \
        -k eventlet \
        -w 1 \
        --worker-connections 1000 \
        --bind 0.0.0.0:$PORT \
        --timeout 60"
    envVars:
      - key: MONGO_URI
        value: "mongodb+srv://user:username@espread.cjniabe.mongodb.net/espread?retryWrites=true&w=majority"
      - key: MONGO_DB
        value: "espread"
      - key: MONGO_COLL
        value: "readings"
      - key: HIVE_HOST
        value:"YOUR_URL".s1.eu.hivemq.cloud"
      - key: HIVE_PORT
        value: "8883"
      - key: HIVE_USER
        value: "USERNAME"
      - key: HIVE_PASS
        value: "PASSWORD"
      - key: HIVE_TOPIC
        value: "sensorData"
      - key: HUMIDITY_LOW_THRESH
        value: "30.0"
      - key: GAS_HIGH_THRESH
        value: "3000"
      - key: IR_HIGH_THRESH
        value: "300"
      - key: GEO_API_URL
        value: "https://www.googleapis.com/geolocation/v1/geolocate?key=YOUR_GOOGLE_API_KEY"
      - key: TWILIO_SID
        value: "ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      - key: TWILIO_TOKEN
        value: "your_auth_token"
      - key: TWILIO_FROM
        value: "whatsapp:+14155238886"
      - key: TWILIO_TO
        value: "whatsapp:+17XXXXXXXXX"
